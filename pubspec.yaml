name: rocket_app
description: "Rocket Rise – Arcade rocket game built with Flutter and Flame."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.10.0
  flutter_riverpod: ^2.5.0
  riverpod: ^2.5.0
  shared_preferences: ^2.2.0
  google_mobile_ads: ^9.0.0
  intl: ^0.20.2
  games_services: ^5.0.0
  package_info_plus: ^10.1.0
  # flutter_jailbreak_detection entfernt: inkompatibel mit AGP 9.x (kein Namespace)
  # Root-Detection erfolgt nativ via dart:io in security_service.dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
