name: Release AAB

on:
  workflow_dispatch:
    inputs:
      version_note:
        description: "Release note (optional)"
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build & Sign Release AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code holen ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter 3.44.1 einrichten ─────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: "stable"
          cache: true

      # ── 3. Java 17 (Gradle-kompatibel) ───────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 4. Flutter Dependencies ───────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 5. Keystore aus Secret dekodieren ─────────────────────────────────────
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/rocket-rise-key.jks

      # ── 6. key.properties schreiben (nur in CI, nie im Repo) ─────────────────
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=rocket-rise-key.jks
          EOF

      # ── 7. Dart Analyse ───────────────────────────────────────────────────────
      - name: Dart analyze
        run: dart analyze

      # ── 8. Release AAB bauen ──────────────────────────────────────────────────
      - name: Build Release AAB
        run: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/debug-info

      # ── 9. AAB als Artifact speichern ─────────────────────────────────────────
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocket-rise-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90

      # ── 10. Debug-Symbole speichern (für Crash-Analyse) ───────────────────────
      - name: Upload Debug Symbols
        uses: actions/upload-artifact@v4
        with:
          name: rocket-rise-debug-symbols
          path: build/debug-info/
          retention-days: 90
