name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Analyze code
        run: dart analyze lib/ test/

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Copy APK to build directory
        run: |
          mkdir -p build/release
          cp build/app/outputs/flutter-apk/app-debug.apk build/release/rocket-app-debug.apk
          echo "APK size: $(du -sh build/release/rocket-app-debug.apk | cut -f1)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocket-app-debug
          path: build/release/rocket-app-debug.apk
          retention-days: 30

      - name: Commit APK to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add build/release/rocket-app-debug.apk
          git diff --staged --quiet || git commit -m "ci: update debug APK [skip ci]"
          git push
