name: Build Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Schreibrechte fuer git push des APK-Commits
permissions:
  contents: write

jobs:
  build:
    name: Build Android Debug APKs
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Voller Clone-Verlauf noetig fuer git push am Ende
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: dart analyze lib/ test/

      - name: Run tests
        run: flutter test --reporter=expanded

      # --- Fat APK (arm + arm64 + x86_64) fuer allgemeine Distribution ---
      - name: Build fat debug APK (all ABIs)
        run: flutter build apk --debug

      # --- ARM64-only APK fuer echte ARM64 Android-Geraete (schlanker, kein x86_64) ---
      - name: Build ARM64-only debug APK
        run: flutter build apk --debug --target-platform android-arm64

      - name: Collect APKs
        run: |
          mkdir -p build/release
          # Fat APK
          cp build/app/outputs/flutter-apk/app-debug.apk \
             build/release/rocket-app-debug.apk
          # ARM64-only APK (gleicher Ausgabepfad, wird durch --target-platform ueberschrieben)
          cp build/app/outputs/flutter-apk/app-debug.apk \
             build/release/rocket-app-debug-arm64.apk
          echo "Fat APK:   $(du -sh build/release/rocket-app-debug.apk | cut -f1)"
          echo "ARM64 APK: $(du -sh build/release/rocket-app-debug-arm64.apk | cut -f1)"

      - name: Upload fat APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: rocket-app-debug-fat
          path: build/release/rocket-app-debug.apk
          retention-days: 30

      - name: Upload ARM64 APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: rocket-app-debug-arm64
          path: build/release/rocket-app-debug-arm64.apk
          retention-days: 30

      # --- Release AppBundle mit Dart-Obfuscation & Debug-Symbolen ---
      # (fuer spaetere Play Store Einreichung und Crashlytics)
      - name: Build release AppBundle (obfuscated)
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/debug-info
        # Hinweis: Signing-Keystore fehlt noch fuer echtes Play-Store-Release.
        # Derzeit mit Debug-Keys signiert (signingConfig = debug in build.gradle.kts).

      - name: Upload release AppBundle as artifact
        uses: actions/upload-artifact@v7
        with:
          name: rocket-app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload debug symbols as artifact
        uses: actions/upload-artifact@v7
        with:
          name: rocket-app-debug-symbols
          path: build/debug-info/
          retention-days: 30

      - name: APK download info
        run: |
          echo "=================================="
          echo "APKs als Artifacts verfügbar (30 Tage)"
          echo "Gehe zur Actions-Seite -> diesen Run -> Artifacts"
          echo "=================================="
